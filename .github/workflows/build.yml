name: Build New Horizon Server Patch

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew jarAndroid
      env:
        ANDROID_HOME: ${{ github.workspace }}/android-sdk # Mocking Android SDK to avoid fail

    - name: Upload Artifact
      uses: actions/upload-artifact@v3
      with:
        name: new-horizon-server-patch
        path: "**/*.jar" # Buscará en todas las carpetas para no fallar
